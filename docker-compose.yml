services:
  mysql:
    image: mysql:8.0
    container_name: hotel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotel_db
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hotel-net

  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-net

  app:
    build: .
    container_name: hotel-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: hotel-docker-secret-key-for-jwt-signing-32chars
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel-net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: hotel-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./user-web/dist:/usr/share/nginx/html/user:ro
      - ./admin-web/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      - app
    networks:
      - hotel-net
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  hotel-net:
    driver: bridge
