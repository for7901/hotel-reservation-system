spring:
  profiles:
    active: dev
  application:
    name: hotel-reservation-system

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:hotel-reservation-system-secret-key-change-in-production-32chars}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cache:
    banner-ttl-seconds: 600
    city-ttl-seconds: 1800
  order:
    payment-timeout-minutes: 30
    timeout-check-interval-ms: 60000
  rate-limit:
    login-max-attempts: 5
    login-window-seconds: 60
