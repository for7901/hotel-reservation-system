name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Check code style (Spotless)
        run: ./mvnw spotless:check -B

      - name: Checkstyle
        run: ./mvnw checkstyle:check -B

      - name: Run tests
        run: ./mvnw test -B

      - name: Build package
        run: ./mvnw package -DskipTests -B
